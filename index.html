<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitMetric</title>

  <!-- PWA & Home Screen Icons -->
  <link rel="icon" type="image/png" href="/assets/app_icon.png" />
  <link rel="apple-touch-icon" href="/assets/app_icon.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/app_icon.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/app_icon.png" />

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0a0a0c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitMetric" />
  <meta name="application-name" content="FitMetric" />
  <meta name="description" content="Your personal fitness and nutrition tracker" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap"
    rel="stylesheet">

  <!-- OneSignal Push Notifications -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "f4e2e7b3-462e-47b1-88d1-07f06c9e8a69",
        notifyButton: { enable: false },
        allowLocalhostAsSecureOrigin: true,
        serviceWorkerPath: "/OneSignalSDKWorker.js",
        serviceWorkerParam: { scope: "/" }
      });
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
