<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0c"/>
      <stop offset="100%" style="stop-color:#0f1420"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#06b6d4" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="3" y="3" width="506" height="506" rx="108" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.4"/>
  <!-- FM text -->
  <text x="256" y="320" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="196" 
    font-weight="900" 
    fill="url(#glow)" 
    text-anchor="middle"
    filter="url(#shadow)"
    letter-spacing="-6">FM</text>
  <!-- Underline accent -->
  <rect x="136" y="348" width="240" height="10" rx="5" fill="url(#glow)" opacity="0.6"/>
</svg>
