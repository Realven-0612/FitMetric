<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0c"/>
      <stop offset="100%" style="stop-color:#0f1420"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#06b6d4" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="2" y="2" width="188" height="188" rx="39" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.4"/>
  <!-- FM text -->
  <text x="96" y="118" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="72" 
    font-weight="900" 
    fill="url(#glow)" 
    text-anchor="middle"
    filter="url(#shadow)"
    letter-spacing="-2">FM</text>
  <!-- Underline accent -->
  <rect x="52" y="130" width="88" height="4" rx="2" fill="url(#glow)" opacity="0.6"/>
</svg>
